<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database PPO v2 - AMS</title>
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        body { background-color: #f0f2f5; padding: 30px; font-family: 'Segoe UI', sans-serif; }
        .container-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-title { border-bottom: 2px solid #dee2e6; margin-bottom: 25px; padding-bottom: 10px; color: #1a73e8; }
        .upload-card { background: #e8f0fe; border: 2px dashed #1a73e8; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        
        /* Gaya Tombol Export */
        .dt-buttons { margin-bottom: 15px; gap: 5px; display: flex; }
        .dt-button { border-radius: 5px !important; border: none !important; color: white !important; font-weight: bold !important; }
        button.buttons-pdf { background-color: #e74c3c !important; } /* Merah untuk PDF */
        button.buttons-excel { background-color: #27ae60 !important; } /* Hijau untuk Excel */
        button.buttons-print { background-color: #34495e !important; } /* Abu-abu untuk Print */
    </style>
</head>
<body>

<div class="container container-box">
    <h2 class="header-title">Database PPO - AMS (Import & Export)</h2>
    
    <div class="upload-card">
        <label class="form-label fw-bold">1. Pilih File Excel Anda</label>
        <input type="file" id="excel_input" class="form-control" accept=".xlsx, .xls">
        <p class="text-muted small mt-2 mb-0">Format kolom wajib: No, Nama Produk, Kategori, Kandungan Aktif, Bentuk Sediaan, Satuan.</p>
    </div>

    <div class="table-responsive">
        <table id="tablePPO" class="table table-hover display nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama Produk</th>
                    <th>Kategori</th>
                    <th>Kandungan Aktif</th>
                    <th>Bentuk Sediaan</th>
                    <th>Satuan</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
    $(document).ready(function() {
        // Inisialisasi Tabel
        var table = $('#tablePPO').DataTable({
            dom: 'Bfrtip', // Menampilkan tombol Export (B)
            buttons: [
                {
                    extend: 'pdfHtml5',
                    text: 'Download PDF',
                    title: 'Laporan Produk PPO - AMS',
                    orientation: 'landscape',
                    pageSize: 'A4',
                    className: 'btn-pdf'
                },
                {
                    extend: 'excelHtml5',
                    text: 'Simpan ke Excel',
                    title: 'Database_PPO_AMS',
                    className: 'btn-excel'
                },
                {
                    extend: 'print',
                    text: 'Cetak Tabel',
                    className: 'btn-print'
                }
            ],
            language: { "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json" }
        });

        // Proses Membaca Excel
        $('#excel_input').on('change', function(e) {
            var reader = new FileReader();
            reader.readAsArrayBuffer(e.target.files[0]);

            reader.onload = function(e) {
                var data = new Uint8Array(reader.result);
                var workbook = XLSX.read(data, { type: 'array' });
                var sheet = workbook.Sheets[workbook.SheetNames[0]];
                var json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                table.clear(); // Bersihkan tabel lama
                
                // Mulai dari i=1 (lewati baris header excel)
                for (var i = 1; i < json.length; i++) {
                    if (json[i].length > 0) {
                        table.row.add([
                            json[i][0] || "", 
                            json[i][1] || "", 
                            json[i][2] || "", 
                            json[i][3] || "", 
                            json[i][4] || "", 
                            json[i][5] || ""
                        ]);
                    }
                }
                table.draw(); // Tampilkan data baru
            };
        });
    });
</script>

</body>
</html>
