<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database PPO - AMS (Export Ready)</title>
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .container-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; }
        h2 { color: #2c3e50; font-weight: 700; margin-bottom: 25px; border-left: 5px solid #e74c3c; padding-left: 15px; }
        
        .filter-area { background: #f1f2f6; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #dfe4ea; }
        .filter-label { font-weight: 600; color: #2f3542; margin-bottom: 8px; display: block; }

        table.dataTable thead { background-color: #34495e; color: white; }
        .badge-kategori { padding: 5px 10px; border-radius: 5px; font-size: 0.85rem; font-weight: 600; display: inline-block; min-width: 100px; text-align: center; }
        
        .bg-prekursor { background-color: #ffeaa7; color: #d35400; }
        .bg-psikotropika { background-color: #fab1a0; color: #c0392b; }
        .bg-oot { background-color: #dfe6e9; color: #2d3436; }
        .bg-default { background-color: #eee; color: #666; }

        /* Jarak antar tombol export */
        .dt-buttons { margin-bottom: 15px; }
        button.dt-button { background-color: #34495e !important; color: white !important; border-radius: 5px !important; border: none !important; }
        button.dt-button:hover { background-color: #2c3e50 !important; }
    </style>
</head>
<body>

<div class="container container-box">
    <h2>Daftar Produk PPO - AMS</h2>

    <div class="filter-area">
        <div class="row">
            <div class="col-md-4">
                <label class="filter-label">Filter Kategori:</label>
                <select id="categoryFilter" class="form-select">
                    <option value="">-- Semua Kategori --</option>
                </select>
            </div>
        </div>
    </div>
    
    <div class="table-responsive">
        <table id="tablePPO" class="table table-hover display" style="width:100%">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7HAFLR1bkCpn6Lbn6vsdHf9zkKvDIoBiyOg_bJRglu0VUHqRPUxJCR1qR2j62RD8Xtw9wrGKbV9Q2/pub?gid=0&single=true&output=csv';

    $(document).ready(function() {
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                const columns = results.meta.fields;
                let categories = new Set();
                let colKategoriIndex = -1;

                // 1. Render Header
                let headerHtml = '<tr>';
                columns.forEach((col, index) => {
                    headerHtml += `<th>${col}</th>`;
                    if (col.toLowerCase().includes('kategori')) colKategoriIndex = index;
                });
                headerHtml += '</tr>';
                $('#tableHead').html(headerHtml);

                // 2. Render Body
                let bodyHtml = '';
                data.forEach(row => {
                    bodyHtml += '<tr>';
                    columns.forEach(col => {
                        let cellValue = (row[col] || '').trim();
                        if (col.toLowerCase().includes('kategori')) {
                            if(cellValue) categories.add(cellValue);
                            let badgeClass = 'bg-default';
                            let val = cellValue.toLowerCase();
                            if (val.includes('prekursor')) badgeClass = 'bg-prekursor';
                            else if (val.includes('psikotropika')) badgeClass = 'bg-psikotropika';
                            else if (val.includes('oot')) badgeClass = 'bg-oot';
                            bodyHtml += `<td><span class="badge-kategori ${badgeClass}">${cellValue}</span></td>`;
                        } else {
                            bodyHtml += `<td>${cellValue}</td>`;
                        }
                    });
                    bodyHtml += '</tr>';
                });
                $('#tableBody').html(bodyHtml);

                // 3. Dropdown Filter
                categories.forEach(cat => {
                    $('#categoryFilter').append(`<option value="${cat}">${cat}</option>`);
                });

                // 4. Inisialisasi DataTable dengan Buttons
                const table = $('#tablePPO').DataTable({
                    "language": { "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json" },
                    "dom": 'Bfrtip', // 'B' untuk memunculkan Buttons
                    "buttons": [
                        {
                            extend: 'excelHtml5',
                            title: 'Data Produk PPO',
                            className: 'btn btn-success'
                        },
                        {
                            extend: 'pdfHtml5',
                            title: 'Data Produk PPO',
                            orientation: 'landscape',
                            pageSize: 'A4'
                        },
                        'print'
                    ],
                    "pageLength": 10,
                    "responsive": true
                });

                // 5. Fungsi Filter
                $('#categoryFilter').on('change', function() {
                    let val = $(this).val();
                    if (colKategoriIndex !== -1) {
                        table.column(colKategoriIndex).search(val ? '^' + val + '$' : '', true, false).draw();
                    }
                });
            }
        });
    });
</script>

</body>
</html>
